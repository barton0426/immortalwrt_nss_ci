#CI项目
name: ARMSR-ALL

#CI计划
on:
  #自动编译：当Auto-Clean运行完成后
  workflow_run:
    workflows: ["Auto-Clean"]
    types:
      - completed
  #手动编译
  workflow_dispatch:
    inputs:
      PACKAGE:
        description: '手动调整插件包，多个请用\n符号隔开。'
        required: false
        type: string
      TEST:
        description: '仅输出配置文件，不编译固件。'
        default: 'false'
        required: false
        type: boolean

#CI权限
permissions: write-all

#CI任务
jobs:
  #━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Job 1: 编译固件（复用WRT-CORE核心）
  #━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  compile:
    name: ARMSR
    strategy:
      fail-fast: false
      matrix:
        CONFIG: [ARMSR]
        SOURCE: [immortalwrt/immortalwrt]
        BRANCH: [openwrt-24.10]

    #调用公用编译核心WRT-CORE.yml
    uses: ./.github/workflows/WRT-CORE.yml
    with:
      #编译配置
      WRT_CONFIG: ${{matrix.CONFIG}}
      #默认主题
      WRT_THEME: aurora
      #默认主机名
      WRT_NAME: N1-DOCKER
      #默认WIFI名称（armsr无WIFI，此项不影响）
      WRT_SSID: OWRT
      #默认WIFI密码
      WRT_WORD: 12345678
      #默认地址
      WRT_IP: 192.168.10.1
      #默认密码，仅作提示，修改无用
      WRT_PW: 无
      #源码链接（官方24.x稳定版）
      WRT_REPO: https://github.com/${{matrix.SOURCE}}.git
      #源码分支
      WRT_BRANCH: ${{matrix.BRANCH}}
      #源码名称
      WRT_SOURCE: ${{matrix.SOURCE}}
      #插件调整
      WRT_PACKAGE: ${{inputs.PACKAGE}}
      #仅输出配置文件
      WRT_TEST: ${{inputs.TEST}}

  #━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Job 2: 将rootfs.tar.gz制作成Docker镜像并推送到ghcr.io
  #━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  docker:
    name: Build & Publish Docker Image
    runs-on: ubuntu-latest
    needs: [compile]
    if: ${{ inputs.TEST != 'true' && !cancelled() }}

    env:
      GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/immortalwrt-n1

    steps:
      - uses: actions/checkout@main

      - name: Download rootfs.tar.gz from release
        id: release
        run: |
          for i in $(seq 1 10); do
            TAG=$(gh release list --repo ${{ github.repository }} \
              --limit 20 --json tagName --jq \
              '.[] | select(.tagName | startswith("ARMSR-")) | .tagName' | head -1)
            if [ -n "$TAG" ]; then
              echo "Found release: $TAG"
              echo "tag=$TAG" >> $GITHUB_OUTPUT
              gh release download "$TAG" --repo ${{ github.repository }} \
                --pattern "*rootfs.tar.gz" --dir /tmp/rootfs
              ls -la /tmp/rootfs/
              exit 0
            fi
            echo "Release not yet available, attempt $i/10..."
            sleep 5
          done
          echo "Failed to find ARMSR release after 10 attempts."
          exit 1

      - name: Build Docker image
        run: |
          cd /tmp/rootfs
          gunzip -c *.rootfs.tar.gz > rootfs.tar
          cat <<'DOCKERFILE' > Dockerfile
          FROM scratch
          ADD rootfs.tar /
          DOCKERFILE
          docker build -t ${{ env.GHCR_IMAGE }}:latest .
          docker tag ${{ env.GHCR_IMAGE }}:latest \
            ${{ env.GHCR_IMAGE }}:${{ steps.release.outputs.tag }}

      - name: Push to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ${{ env.GHCR_IMAGE }}:latest
          docker push ${{ env.GHCR_IMAGE }}:${{ steps.release.outputs.tag }}
